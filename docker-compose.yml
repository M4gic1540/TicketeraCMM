version: "3.9"

# =====================================================================
# ASDP - Agile Service Desk Platform
# Orquestación base (Fase 1): infraestructura compartida + API Gateway.
# Los microservicios (identity, ticket, asset, notification, reporting,
# knowledge, audit) se agregan como servicios adicionales en fases
# posteriores, cada uno con su propio Dockerfile bajo /services/<name>.
# =====================================================================

networks:
  asdp-net:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:

services:

  # -------------------------------------------------------------------
  # API Gateway (Traefik) - enrutamiento, punto de entrada único
  # -------------------------------------------------------------------
  gateway:
    image: traefik:v3.1
    container_name: asdp-gateway
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "${GATEWAY_PORT:-80}:80"
      - "${GATEWAY_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - asdp-net
    depends_on:
      - postgres
      - redis
      - rabbitmq
    restart: unless-stopped

  # -------------------------------------------------------------------
  # PostgreSQL - Fase 1 (MVP): base compartida con esquemas lógicos.
  # Fase 3+: cada microservicio migra a su propia instancia (ver
  # Docs/Database-Per-Service.md).
  # -------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: asdp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asdp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asdp_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-asdp_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - asdp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asdp}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # -------------------------------------------------------------------
  # Redis - caché y soporte a colas ligeras / rate limiting.
  # -------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: asdp-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-asdp_dev_password}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - asdp-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-asdp_dev_password}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # -------------------------------------------------------------------
  # RabbitMQ - broker de eventos (comunicación asíncrona entre servicios).
  # -------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: asdp-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-asdp}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-asdp_dev_password}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - asdp-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # -------------------------------------------------------------------
  # Observabilidad (Fase 8 del roadmap) - se deja preparado, apagado
  # por defecto vía profile "observability".
  # -------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: asdp-prometheus
    profiles: ["observability"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - asdp-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: asdp-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3300}:3000"
    networks:
      - asdp-net
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: asdp-loki
    profiles: ["observability"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    networks:
      - asdp-net
    restart: unless-stopped

  # =====================================================================
  # A partir de aquí se agregan los microservicios de negocio conforme
  # avanza el roadmap (F3-F6). Cada uno sigue el mismo patrón:
  #
  # identity-service:
  #   build: ./services/identity-service
  #   env_file: ./services/identity-service/.env
  #   networks: [asdp-net]
  #   depends_on: [postgres, rabbitmq]
  #   labels:
  #     - "traefik.enable=true"
  #     - "traefik.http.routers.identity.rule=PathPrefix(`/api/v1/auth`, `/api/v1/users`)"
  #
  # (ticket-service, asset-service, notification-service, reporting-service,
  #  knowledge-service, audit-service siguen el mismo esquema)
  # =====================================================================
